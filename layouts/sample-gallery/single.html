<style>
    /* Minimal card skeleton so SSR doesn't look broken before full CSS loads */
    #samples-root {
        display: grid;
        gap: 12px;
    }

    .sample-card {
        border: 1px solid rgba(0, 0, 0, .12);
        border-radius: 10px;
        padding: 12px;
    }

    .sample-card h3 {
        margin: 0 0 6px 0;
        font-size: 1rem;
    }

    .sample-card p {
        margin: 0;
        opacity: .85;
    }
</style>
<link rel="stylesheet" href="/vendor/pnp-samples-gallery/pnp-samples-gallery.css" />
<script>
    // Minimal shim for browser bundles expecting Node's `process`
    window.process = window.process || { env: { NODE_ENV: "production" } };
</script>
<section class="custom hero-main" id="hero">
    <div class="hero-main-inner">
        <div class="logo-big">
            <span class="">{{ .Title }}</span>
        </div>

        <div class="tagline">
            {{if .Content }}
            {{ .Content }}
            {{ end }}
        </div>
    </div>
</section>

{{ $samples := index site.Data "all-samples" }}


<script id="samples-data" type="application/json">{{ $samples | jsonify | safeHTML }}</script>

<section class="section-base samples" id="{{ .File.BaseFileName | safeHTML }}">
    <div class="section-inner">
        <div id="samples-root" class="ssr-cloak" data-pnp-samples-gallery
            data-src="{{ with .Site.Params.pnpSamplesGallery.dataSrc }}{{ . }}{{ end }}"
            data-base-url="{{ .Site.BaseURL }}" {{ $cfg :=dict "reactionsSupported"
            .Site.Params.pnpSamplesGallery.reactions.enabled "giscus" (dict "repo"
            .Site.Params.pnpSamplesGallery.reactions.repo "repoId"
            .Site.Params.pnpSamplesGallery.reactions.repoId "category"
            .Site.Params.pnpSamplesGallery.reactions.category "categoryId"
            .Site.Params.pnpSamplesGallery.reactions.categoryId ) }}{{ with $cfg }}data-config='{{ . | jsonify }}' {{
            end }}>
            >
            {{ range $samples }}
            {{ partial "sample-card.html" . }}
            {{ end }}
        </div>
    </div>
</section>

<script src="/vendor/pnp-samples-gallery/pnp-samples-gallery.js?cb={{ now.Unix }}"></script>
